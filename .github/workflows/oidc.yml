name: OIDC AWS Test
on: push
permissions:
    id-token: write
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        steps: 
            - uses: actions/checkout@v4
            - name: Configure AWS
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume : arn:aws:iam::767124094747:role/GitHubOIDCRole
                aws-region: ap-south-1

            - name: Test AWS
              run: aws sts get-caller-identity
                 


